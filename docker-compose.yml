services:
  postgres:
    image: postgres:17-alpine
    container_name: asami-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asami}
      POSTGRES_USER: ${POSTGRES_USER:-asami}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asami_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - asami_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asami} -d ${POSTGRES_DB:-asami}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  asami_postgres_data:
